services:
  db:
    image: postgres:16-alpine
    container_name: fantadc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fantadc
      POSTGRES_PASSWORD: fantadc
      POSTGRES_DB: fantadc
    ports:
      - "5432:5432"
    volumes:
      - fantadc-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fantadc -d fantadc"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fantadc-db-data:
